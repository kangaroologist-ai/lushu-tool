/* ---------- P4.5「⚡ 预热」:出发前一晚点一次,遍历全部天落本地缓存(OSRM 算路 + 天气),不含瓦片 ----------
   - OSRM:对每天 routeChain 的陆地段调 osrm()(永久缓存 gstore.osrm2.*);命中缓存即跳过网络。
   - 天气:复用 loadWeather() —— 全程预报一次多坐标 + 气候按 0.1° 格去重各一次,已新鲜的跳过。
   - 并发限流:OSRM 段最多 3 个在飞(OSRM demo 单机限速,几十段一次性打会 429);失败的段跳过不阻断。
   - 进度:toast 报「预热 3/9…」;完成提示算路成功段数 + 天气状态。瓦片一律不碰(规格硬要求)。 */
let warming=false;
async function runWarmup(){
  if(warming)return;
  if(!TRIP||!TRIP.days.length){toast("没有可预热的行程");return;}
  if(navigator.onLine===false){toast("当前离线,无法预热;联网后再点");return;}
  warming=true;
  const btn=$("#warmup"); if(btn){btn.disabled=true;btn.textContent="⏳ 预热中";}
  const myId=TRIP_ID, myLoad=loadSeq;
  const aborted=()=>TRIP_ID!==myId||loadSeq!==myLoad;   // 预热中切了行程/导入 → 中止,不污染新行程提示
  try{
    // ① 收集全程陆地路段(去重坐标链),逐段算路并限流
    const segKeys=new Set(), segs=[];
    for(let di=0;di<TRIP.days.length;di++){
      for(const seg of routeChain(di)){
        if(seg.sea||seg.pts.length<2)continue;
        const coords=seg.pts.map(p=>[p.lat,p.lng]);
        const k=osrmKey(coords);
        if(segKeys.has(k))continue;            // 同段路跨日只算一次(键=坐标链)
        segKeys.add(k); segs.push(coords);
      }
    }
    const total=segs.length;
    let done=0, okN=0, failN=0;
    const CONC=3, queue=segs.slice();
    async function worker(){
      while(queue.length){
        if(aborted())return;
        const coords=queue.shift();
        try{const r=await osrm(coords); if(r&&r.geo)okN++; else failN++;}   // 失败跳过不阻断
        catch(e){failN++;}
        done++;
        if(!aborted()&&total)toast("预热 "+done+"/"+total+"… 算路");
      }
    }
    await Promise.all(Array.from({length:Math.min(CONC,total||1)},worker));
    if(aborted())return;
    // ② 重画当前日路线(新缓存几何可即时上图)+ 刷新当前日驾驶实测里程
    renderMap();
    const cdi=TRIP.days.findIndex(d=>d.id===view); if(cdi>=0)updateDriveStats(cdi);
    // ③ 天气:复用 loadWeather 全程批量落缓存(预报一次多坐标 + 气候去重)
    if(!aborted())toast("预热 天气…");
    try{await loadWeather();}catch(e){}
    if(aborted())return;
    const seaNote=total?"":"(全程无陆地路段)";
    toast("预热完成:算路 "+okN+"/"+total+" 段"+(failN?"("+failN+" 段失败,可联网重试)":"")+seaNote+",天气已落缓存");
  }finally{
    warming=false;
    if(btn){btn.disabled=false;btn.textContent="⚡ 预热";}
  }
}
$("#warmup").onclick=runWarmup;

/* ---------- P12 10km 走廊离线地图:同源 GeoJSON 小包,不抓/缓存公共瓦片 ---------- */
const MAP_CACHE="ukmd-map-v1";
const MAP_MANIFEST="./offline-map/manifest.json";
let offlineMapManifest=null,offlineMapLayer=null,offlineMapCached=false,offlineMapDownloading=false,offlineMapForced=false,tileFailN=0,offlineMapAttribution="";
function fmtBytes(n){
  n=Number(n)||0;
  if(n>=1024*1024)return (n/1024/1024).toFixed(n>=10*1024*1024?0:1)+"MB";
  if(n>=1024)return Math.round(n/1024)+"KB";
  return n+"B";
}
function offlineMapFiles(m){
  return (m&&Array.isArray(m.files)?m.files:[]).filter(f=>f&&f.path&&f.bytes>=0);
}
function offlineMapBytes(m){
  return offlineMapFiles(m).reduce((n,f)=>n+(Number(f.bytes)||0),0);
}
async function mapCache(){
  if(!("caches" in window))throw new Error("浏览器不支持 Cache API");
  return caches.open(MAP_CACHE);
}
async function cachedMapManifest(){
  try{
    const c=await mapCache();
    const r=await c.match(MAP_MANIFEST);
    return r?await r.json():null;
  }catch(e){return null;}
}
async function liveMapManifest(){
  const r=await fetchTO(MAP_MANIFEST,{cache:"no-store"},5000);
  if(!r.ok)throw new Error("HTTP "+r.status);
  return r.json();
}
async function updateOfflineMapButtons(){
  const b=$("#omap"),x=$("#omapclear"); if(!b)return;
  let live=null,cached=null;
  try{live=await liveMapManifest();}catch(e){}
  cached=await cachedMapManifest();
  offlineMapManifest=live||cached;
  offlineMapCached=!!cached;
  b.hidden=!offlineMapManifest;
  b.disabled=offlineMapDownloading;
  const visible=offlineMapLayer&&map.hasLayer(offlineMapLayer);
  b.textContent=offlineMapDownloading?"⏳ 地图中":(offlineMapCached?(visible?"🗺 隐藏地图":"🗺 离线图"):"🗺 下载地图");
  if(x)x.hidden=!offlineMapCached;
}
function offlineMapStyle(f){
  const p=f.properties||{};
  if(p.layer==="corridor")return {pane:"offlinePane",color:"#D7D7C8",weight:.5,opacity:.35,fillColor:"#EDE8D8",fillOpacity:.28};
  if(p.layer==="route_line")return {pane:"offlinePane",color:p.sea?"#4A86B8":(p.color||"#8A6F3D"),weight:p.sea?1.3:1.6,opacity:.62,dashArray:p.sea?"3 5":null};
  return {pane:"offlinePane",color:"#8A9A8D",weight:1,opacity:.45,fillOpacity:.1};
}
function offlineMapPoint(f,ll){
  const p=f.properties||{},name=String(p.name||"").trim();
  if(!name)return L.circleMarker(ll,{pane:"offlinePane",radius:2,weight:0,fillColor:"#64756A",fillOpacity:.5});
  const cls=p.layer==="stay_label"?"omap-label stay":"omap-label";
  return L.marker(ll,{pane:"offlinePane",interactive:false,icon:L.divIcon({className:"",iconSize:null,html:'<span class="'+cls+'">'+esc(name)+"</span>"})});
}
async function readMapGeojson(m){
  const file=offlineMapFiles(m).find(f=>/\.geojson$/i.test(f.path));
  if(!file)throw new Error("manifest 缺少 geojson 文件");
  const c=await mapCache();
  let r=await c.match(file.path);
  if(!r&&navigator.onLine!==false)r=await fetchTO(file.path,{cache:"no-store"},12000);
  if(!r||!r.ok)throw new Error("离线地图未下载");
  return r.json();
}
function setOfflineMapVisible(on,forced){
  if(!offlineMapLayer)return;
  const before=map.hasLayer(offlineMapLayer);
  if(typeof forced==="boolean")offlineMapForced=forced;
  if(on&&!before)offlineMapLayer.addTo(map);
  if(!on&&before)map.removeLayer(offlineMapLayer);
  if(before!==map.hasLayer(offlineMapLayer)||typeof forced==="boolean")updateOfflineMapButtons();
}
async function loadOfflineMapLayer(show){
  const m=offlineMapManifest||await cachedMapManifest();
  if(!m)return false;
  const geo=await readMapGeojson(m);
  if(offlineMapLayer)offlineMapLayer.remove();
  if(offlineMapAttribution)map.attributionControl.removeAttribution(offlineMapAttribution);
  offlineMapLayer=L.geoJSON(geo,{pane:"offlinePane",style:offlineMapStyle,pointToLayer:offlineMapPoint});
  offlineMapAttribution="离线走廊地图 "+(m.version||"");
  map.attributionControl.addAttribution(offlineMapAttribution);
  setOfflineMapVisible(!!show);
  return true;
}
async function maybeShowOfflineMap(){
  try{
    const cached=await cachedMapManifest();
    if(!cached)return false;
    offlineMapManifest=cached;offlineMapCached=true;
    await loadOfflineMapLayer(navigator.onLine===false||tileFailN>=4);
    return true;
  }catch(e){return false;}
}
async function downloadOfflineMap(){
  if(offlineMapDownloading)return;
  const b=$("#omap");
  offlineMapDownloading=true;if(b){b.disabled=true;b.textContent="⏳ 地图中";}
  try{
    const r=await fetchTO(MAP_MANIFEST,{cache:"no-store"},8000);
    if(!r.ok)throw new Error("manifest HTTP "+r.status);
    const manifestText=await r.text();
    const m=JSON.parse(manifestText);
    const files=offlineMapFiles(m);
    const total=offlineMapBytes(m);
    const hard=Number(m.hardMaxBytes)||80*1024*1024;
    if(!files.length)throw new Error("manifest 没有文件");
    if(total>hard)throw new Error("离线地图 "+fmtBytes(total)+" 超过上限 "+fmtBytes(hard));
    if(navigator.storage&&navigator.storage.estimate){
      const est=await navigator.storage.estimate();
      const quota=Number(est.quota)||0,usage=Number(est.usage)||0;
      if(quota&&usage+total>quota*.85)throw new Error("浏览器剩余空间不足,需要 "+fmtBytes(total));
    }
    const c=await mapCache();
    let done=0;
    for(const f of files){
      const fr=await fetchTO(f.path,{cache:"no-store"},30000);
      if(!fr.ok)throw new Error(f.path+" HTTP "+fr.status);
      const blob=await fr.blob();
      if(f.bytes&&Math.abs(blob.size-f.bytes)>Math.max(2048,f.bytes*.02))throw new Error(f.path+" 大小不一致");
      done+=blob.size;
      if(done>hard)throw new Error("离线地图超过上限 "+fmtBytes(hard));
      await c.put(f.path,new Response(blob,{headers:{"Content-Type":fr.headers.get("Content-Type")||"application/geo+json"}}));
      toast("离线地图 "+fmtBytes(done)+"/"+fmtBytes(total));
    }
    await c.put(MAP_MANIFEST,new Response(manifestText,{headers:{"Content-Type":"application/json;charset=utf-8"}}));
    offlineMapManifest=m;offlineMapCached=true;
    await loadOfflineMapLayer(true);
    offlineMapForced=true;
    toast("离线地图已下载 "+fmtBytes(done)+" · 10km 走廊");
  }catch(e){toast("离线地图失败:"+(e&&e.message||e));}
  finally{offlineMapDownloading=false;await updateOfflineMapButtons();refreshOfflineStatus();}
}
async function clearOfflineMap(){
  try{
    if(!confirm("清除已下载的离线地图? 行程离线缓存不受影响。"))return;
    if("caches" in window)await caches.delete(MAP_CACHE);
    if(offlineMapLayer){offlineMapLayer.remove();offlineMapLayer=null;}
    if(offlineMapAttribution){map.attributionControl.removeAttribution(offlineMapAttribution);offlineMapAttribution="";}
    offlineMapCached=false;offlineMapManifest=null;offlineMapForced=false;tileFailN=0;
    await updateOfflineMapButtons();refreshOfflineStatus();
    toast("离线地图已清除");
  }catch(e){toast("清除离线地图失败:"+(e&&e.message||e));}
}
async function toggleOfflineMapButton(){
  if(!offlineMapCached){await downloadOfflineMap();return;}
  try{
    if(offlineMapLayer&&map.hasLayer(offlineMapLayer)){
      setOfflineMapVisible(false,false);toast("已隐藏离线地图");
    }else{
      await loadOfflineMapLayer(true);offlineMapForced=true;toast("已显示离线地图");
    }
    refreshOfflineStatus();
  }catch(e){toast("离线地图失败:"+(e&&e.message||e));}
}
async function offlineMapStatusText(){
  if(location.protocol!=="http:"&&location.protocol!=="https:")return "";
  const m=await cachedMapManifest();
  if(m)return "地图 ✅ "+(m.bufferKm||10)+"km / "+fmtBytes(offlineMapBytes(m));
  const live=offlineMapManifest||await liveMapManifest().catch(()=>null);
  if(live)return "地图 ⚠ 未下载("+fmtBytes(offlineMapBytes(live))+")";
  return "";
}
const omapBtn=$("#omap");if(omapBtn)omapBtn.onclick=toggleOfflineMapButton;
const omapClearBtn=$("#omapclear");if(omapClearBtn)omapClearBtn.onclick=clearOfflineMap;
cartoLayer.on("tileload",()=>{tileFailN=0;if(navigator.onLine!==false&&!offlineMapForced)setOfflineMapVisible(false);});
cartoLayer.on("tileerror",()=>{tileFailN++;if(tileFailN>=4)maybeShowOfflineMap();});
window.addEventListener("offline",()=>maybeShowOfflineMap().then(()=>refreshOfflineStatus()));
window.addEventListener("online",()=>{tileFailN=0;if(!offlineMapForced)setOfflineMapVisible(false);refreshOfflineStatus();});
updateOfflineMapButtons().then(()=>maybeShowOfflineMap()).then(()=>refreshOfflineStatus()).catch(()=>{});

/* ---------- 编辑器(P3.2–3.5) ----------
   统一事务:mutate TRIP → serializeTrip → parseTrip → 以 T2 替换 TRIP、SRC=newMd → 草稿落 store(draft)
   → 跨日派生起点对比(toast + chip 红点)→ renderPanel/renderMap/天气回填。warnings/dateISO 永远一致。 */
let editMode=false, EF=null, pickHandler=null, qSeq=0, qTimer=null, lastNomTs=0;
let _origTitle=null;   // 搜索选点覆盖标题前的原值(null=尚未覆盖)
let ORIG_SRC="", draftActive=false;
const dirtyDays=new Set();   // 起点已变待复查的天(chip 红点,切到该天即清)
const COORD_RE=/^\s*(-?\d{1,3}(?:\.\d+)?)\s*[,，]\s*(-?\d{1,3}(?:\.\d+)?)\s*$/;   // 粘贴坐标(支持全角逗号)
const TIME_RE=/^([01]?\d|2[0-3]):[0-5]\d$/;
const SEP_BAD=/[|｜]/;                                            // ｜ 是 MD 段分隔符,文本字段禁用
const COORD_IN=/@\s*-?\d+(?:\.\d+)?\s*,\s*-?\d+(?:\.\d+)?/;       // 文本里的「@纬,经」片段会被 parser 当坐标吃掉

function discardDraft(){   // P10.3:#pfoot 的 dft-x 与动作单的 as-dft 共用

$("#pfoot").addEventListener("click",e=>{if(e.target.id==="dft-x")discardDraft();});

function commitEdit(fn,okMsg){
  if(!TRIP)return false;
  const before=TRIP.days.map((d,i)=>prevStayPoint(i));   // 3.4:各天派生起点快照(编辑不增删天,索引对齐)
  try{
    fn(TRIP);
    const md=serializeTrip(TRIP), T2=parseTrip(md);
    if(!T2.days.length)throw new Error("序列化后解析不到行程日");
    TRIP=T2;SRC=md;
  }catch(e){
    try{TRIP=parseTrip(SRC);}catch(_){}                  // 回滚:SRC 仍是上一次一致状态
    toast("保存失败:"+e.message);return false;
  }
  store.set("draft",{md:SRC,ts:Date.now()});
  draftActive=true;updateSrcHint();
  const msgs=[];
  TRIP.days.forEach((d,i)=>{
    const o=before[i], p=prevStayPoint(i);
    const same=(!o&&!p)||(o&&p&&Math.abs(o.lat-p.lat)<1e-9&&Math.abs(o.lng-p.lng)<1e-9&&o.name===p.name);
    if(!same){msgs.push(d.id+" 起点已变:"+(o?o.name:"无")+" → "+(p?p.name:"无"));if(d.id!==view)dirtyDays.add(d.id);}
  });
  closeForm();
  renderPanel();renderMap();fillWeatherDOM();
  if(gmode)gset(gViewUrl());
  loadWeather();                                          // 新坐标天气回填(loadSeq/TRIP_ID 令牌守卫)
  const all=[okMsg].concat(msgs).filter(Boolean).join("；");
  if(all)toast(all);
  return true;
}

function ectlHtml(ix,len){

    '<button data-eact="up" title="上移"'+(ix===0?" disabled":"")+'>↑</button>'+

function editAct(b){
  if(!TRIP)return;
  const di=TRIP.days.findIndex(d=>d.id===view); if(di<0)return;
  const act=b.dataset.eact, d=TRIP.days[di];
  if(act==="ins")return openForm({kind:"item",di,at:+b.dataset.at});
  if(act==="stay-add"||act==="stay-edit")return openForm({kind:"stay",di});
  if(act==="stay-del"){
    if(!d.stay||!confirm("删除 "+d.id+" 住宿「"+(d.stay.h||"")+"」?"))return;
    commitEdit(T=>{T.days[di].stay=null;},"已删除住宿");return;
  }
  const li=b.closest("[data-ix]"); if(!li)return;
  const ix=+li.dataset.ix, it=d.items[ix]; if(!it)return;
  if(act==="edit")return openForm({kind:"item",di,ix});
  if(act==="del"){
    if(!confirm("删除条目「"+it.t+" "+it.w+"」?"))return;
    commitEdit(T=>{T.days[di].items.splice(ix,1);},"已删除");return;
  }
  if(act==="up"&&ix>0){if(commitEdit(T=>{const a=T.days[di].items,x=a[ix-1];a[ix-1]=a[ix];a[ix]=x;},"已上移"))hlMoved(ix-1);}
  else if(act==="down"&&ix<d.items.length-1){if(commitEdit(T=>{const a=T.days[di].items,x=a[ix+1];a[ix+1]=a[ix];a[ix]=x;},"已下移"))hlMoved(ix+1);}
}
/* 移动后高亮落点:滚动保持下原屏幕位换成了相邻条目,高亮让「连击原位」的错位肉眼可见 */

  EF=st;

  const isEditItem=!isStay&&st.ix!=null;
  $("#ef-mv").style.display=isEditItem?"flex":"none";    // 3.5:仅编辑已有条目时提供跨天移动
  if(isEditItem){
    $("#ef-prev").disabled=st.di===0;                    // D1 无前移
    $("#ef-next").disabled=st.di===TRIP.days.length-1;   // 末日无后移
  }
  $("#ef-del").style.display=(isEditItem||(isStay&&d.stay))?"":"none";   // P10.3 仅编辑已有条目/住宿才显示删除
  let title, v={t:"",e:"",w:"",p:"",note:"",url:"",ll:""};
  if(isStay){
    const s=d.stay;
    title=(s?"编辑住宿":"添加住宿")+" · "+d.id;
    if(s)v={...v,w:s.h||"",p:s.p||"",note:s.note||"",ll:s.lat!=null?s.lat+", "+s.lng:""};
  }else if(st.ix!=null){
    const it=d.items[st.ix];
    title="编辑条目 · "+d.id;
    v={t:it.t||"",e:it.e||"",w:it.w||"",p:"",note:it.note||"",url:it.url||"",ll:it.lat!=null?it.lat+", "+it.lng:""};
  }else title="插入条目 · "+d.id+"（第 "+(st.at+1)+" 位）";
  $("#ef-title").textContent=title;
  $("#ef-t").value=v.t;$("#ef-e").value=v.e;$("#ef-w").value=v.w;$("#ef-p").value=v.p;
  $("#ef-note").value=v.note;$("#ef-url").value=v.url;$("#ef-ll").value=v.ll;
  $("#ef-q").value="";$("#ef-err").textContent="";showRes([]);showDeg("");_clearRestoreBtn();
  // emoji 快选行:住宿模式随 #ef-row-te 同步隐藏
  const echipsRow=$("#ef-row-echips");
  echipsRow.style.display=isStay?"none":"flex";
  echipsRow.innerHTML="";
  if(!isStay){
    const FALLBACK=["📍","🏰","🥾","🍽","☕","🏨","⛴","🅿️","⛽","📸"];
    // 统计全部 items 的 emoji 频次
    const freq=new Map();
    for(const day of TRIP.days)for(const it of day.items||[]){const e=it.e;if(e)freq.set(e,(freq.get(e)||0)+1);}
    const byFreq=[...freq.entries()].sort((a,b)=>b[1]-a[1]).map(([e])=>e);
    // 合并去重,高频优先,截断 12
    const seen=new Set();
    const chips=[];
    for(const e of [...byFreq,...FALLBACK]){if(!seen.has(e)){seen.add(e);chips.push(e);}if(chips.length>=12)break;}
    for(const e of chips){
      const btn=document.createElement("button");
      btn.type="button";btn.className="efec";
      // textContent 赋值天然无 XSS,等同于 esc() 在 innerHTML 的作用
      btn.textContent=e;
      btn.addEventListener("click",()=>{$("#ef-e").value=e;});
      echipsRow.appendChild(btn);
    }
  }
  $("#eform").classList.add("on");
  setTimeout(()=>{const f=$(isStay||st.ix!=null?"#ef-w":"#ef-t");if(f)f.focus();},0);
}

/* P19 增量平移(方案 A):改某条时间→询问后把该天其后各时间点同步 ±Δ(渡轮/飞行等固定班次跳过);不引入时长模型 */
function hhmmToMin(t){const m=String(t||"").match(/^(\d{1,2}):(\d{2})$/);return m?(+m[1]*60+ +m[2]):null;}
function minToHHMM(v){v=Math.max(0,Math.min(1439,v));return String(Math.floor(v/60)).padStart(2,"0")+":"+String(v%60).padStart(2,"0");}
function shiftTimesAfter(d,fromIx,deltaMin){
  for(let i=fromIx+1;i<d.items.length;i++){
    if(d.items[i].ferry)continue;                 // 渡轮/飞行固定班次不挪
    const m=hhmmToMin(d.items[i].t); if(m==null)continue;
    d.items[i].t=minToHHMM(m+deltaMin);
  }
}
function saveForm(){
  if(!EF||!TRIP||!TRIP.days[EF.di])return;
  const isStay=EF.kind==="stay", err=[];
  const w=$("#ef-w").value.trim(), note=$("#ef-note").value.trim(), llv=$("#ef-ll").value.trim();
  let lat=null,lng=null,t="",e="",url="",p="";
  if(llv){
    const m=llv.match(COORD_RE);
    if(!m)err.push("坐标格式应为「lat, lng」");
    else{lat=+parseFloat(m[1]).toFixed(5);lng=+parseFloat(m[2]).toFixed(5);   // 保存边界统一 5 位圆整,手填/粘贴同权
      if(!(lat>=-90&&lat<=90))err.push("纬度须在 ±90 内");
      if(!(lng>=-180&&lng<=180))err.push("经度须在 ±180 内");}
  }
  if(SEP_BAD.test(w)||SEP_BAD.test(note))err.push("标题/备注不能含「｜」「|」分隔符");
  if(COORD_IN.test(w)||COORD_IN.test(note))err.push("文本不能含「@纬度,经度」片段(会被解析为坐标)");
  if(isStay){
    if(!w)err.push("住宿名称必填");
    p=$("#ef-p").value.trim();
    if(SEP_BAD.test(p))err.push("价格不能含「｜」「|」");
    if(COORD_IN.test(p))err.push("价格不能含「@纬度,经度」片段");
  }else{
    t=$("#ef-t").value.trim();
    e=$("#ef-e").value.trim()||"📍";
    url=$("#ef-url").value.trim();
    if(!TIME_RE.test(t))err.push("时间须为 HH:MM(00:00–23:59)");
    if(/\s/.test(e)||SEP_BAD.test(e))err.push("emoji 不能含空格或「｜」「|」");
    if(url&&!/^https?:\/\//.test(url))err.push("URL 须以 http:// 或 https:// 开头(小写)");
    if(url&&(SEP_BAD.test(url)||/\s/.test(url)))err.push("URL 不能含空格或「｜」「|」");
    // 谷歌地图分享链接含「@lat,lng」:reparse 时会被 parser 当条目坐标吃掉且 URL 被截断 → @→%40(URL 语义等价、无损)
    if(url&&COORD_IN.test(url))url=url.replace(/@/g,"%40");
    // parser 对「｜」段做 ^https?:// 判定:以 URL 开头的备注 reparse 后会漂移成 url / 整段丢失,入口拦截
    if(note&&/^https?:\/\//.test(note))err.push("备注不能以 http(s):// 开头(再解析会被当成链接,备注丢失);请放 URL 栏或在前面加文字");
  }
  if(err.length){$("#ef-err").textContent=err.join("；");return;}
  const st=EF;
  // P19 编辑已有条目且改了时间 → 询问是否把其后各时间点同步顺延/提前 Δ 分钟
  let shift=0,shiftN=0;
  if(!isStay&&st.ix!=null){
    const om=hhmmToMin(TRIP.days[st.di].items[st.ix].t), nm=hhmmToMin(t);
    if(om!=null&&nm!=null&&nm!==om){
      const after=TRIP.days[st.di].items.slice(st.ix+1).filter(x=>hhmmToMin(x.t)!=null&&!x.ferry).length;
      if(after>0){const dlt=nm-om;
        if(confirm("把这条之后的 "+after+" 个时间点也"+(dlt>0?"顺延 "+dlt:"提前 "+(-dlt))+" 分钟?(渡轮/飞行等固定班次不动)")){shift=dlt;shiftN=after;}}
    }
  }
  commitEdit(T=>{
    const d=T.days[st.di];
    if(isStay)d.stay={h:w,p,note,lat,lng};
    else{
      const it={t,e,w,note,url,lat,lng,ferry:false};     // ferry 等派生值由事务内 reparse 重算
      if(st.ix!=null)d.items[st.ix]=it; else d.items.splice(st.at,0,it);
      if(shift)shiftTimesAfter(d,st.ix,shift);
    }
  },shiftN?("已保存,后续 "+shiftN+" 条已"+(shift>0?"顺延":"提前")):"已保存");
}

function moveItem(dir){
  if(!EF||EF.kind!=="item"||EF.ix==null)return;
  const st=EF, dj=st.di+dir;
  if(dj<0||dj>=TRIP.days.length)return;
  const tgt=TRIP.days[dj].id;

  },"已移到 "+tgt+(dir<0?" 末":" 初"));
}

/* —— 坐标搜索(契约):拉丁≥3字符防抖300ms→Photon(当日锚点偏置);含CJK→回车→Nominatim(节流1s)+Open-Meteo 并行;
      粘贴 "lat, lng" 纯本地;失败/空结果给降级文案,点地图取点永远可用 —— */
function efAnchor(){
  if(EF&&TRIP&&TRIP.days[EF.di]){
    const p=dayPoints(TRIP.days[EF.di]); if(p.length)return p[0];
    const pv=prevStayPoint(EF.di); if(pv)return pv;
  }
  return {lat:57.41,lng:-6.19};   // 契约缺省锚:波特里
}
function showDeg(msg){const el=$("#ef-deg");el.textContent=msg||"";el.style.display=msg?"block":"none";}
function _clearRestoreBtn(){

function showRes(list){

$("#ef-res").addEventListener("click",e=>{

    if(cur&&cur!==newName&&_origTitle===null)_origTitle=cur;

});
async function photonSearch(q){
  const seq=++qSeq, a=efAnchor();
  try{
    const r=await fetchTO("https://photon.komoot.io/api/?q="+encodeURIComponent(q)+"&limit=5&lat="+a.lat+"&lon="+a.lng,null,5000);
    if(!r.ok)throw new Error("HTTP "+r.status);
    const j=await r.json();
    if(seq!==qSeq)return;
    const list=(j.features||[]).filter(f=>f&&f.geometry&&Array.isArray(f.geometry.coordinates)).map(f=>({
      src:"",name:(f.properties&&f.properties.name)||"",
      label:[f.properties&&f.properties.name,f.properties&&f.properties.city,f.properties&&f.properties.country].filter(Boolean).join(", "),
      lat:+f.geometry.coordinates[1],lng:+f.geometry.coordinates[0]}))   // GeoJSON 坐标序 [lng,lat];+强转+isFinite:非数字响应不得进 DOM 属性
      .filter(x=>isFinite(x.lat)&&isFinite(x.lng));
    if(list.length){showRes(list);showDeg("");}
    else{showRes([]);showDeg("未找到「"+q+"」,可尝试换词或点地图取点");}
  }catch(e){if(seq===qSeq){showRes([]);showDeg("搜索不可用 — 可点地图取点,或粘贴坐标(如 57.27, -5.51)");}}
}
async function cjkSearch(q){
  const now=Date.now(); if(now-lastNomTs<1000)return;   // Nominatim 政策:≤1 req/s
  lastNomTs=now;
  const seq=++qSeq, enc=encodeURIComponent(q);
  const [nr,or]=await Promise.allSettled([
    fetchTO("https://nominatim.openstreetmap.org/search?q="+enc+"&format=jsonv2&limit=5&accept-language=zh",null,5000).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}),
    fetchTO("https://geocoding-api.open-meteo.com/v1/search?name="+enc+"&count=5&language=zh",null,5000).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  ]);
  if(seq!==qSeq)return;
  const nom=(nr.status==="fulfilled"&&Array.isArray(nr.value))?nr.value.slice()
    .sort((a,b)=>(b.importance||0)-(a.importance||0)).slice(0,3)
    .map(x=>({src:"OSM",name:x.name||String(x.display_name||"").split(",")[0].trim(),
      label:x.display_name||"",lat:parseFloat(x.lat),lng:parseFloat(x.lon)}))   // lat/lon 是字符串,必须 parseFloat
    .filter(x=>isFinite(x.lat)&&isFinite(x.lng)):null;
  const om=(or.status==="fulfilled"&&or.value&&Array.isArray(or.value.results))?or.value.results.slice(0,3)
    .map(x=>({src:"城市",name:x.name||"",label:[x.name,x.admin1,x.country].filter(Boolean).join(", "),
      lat:+x.latitude,lng:+x.longitude}))                 // 同 Photon:+强转防非数字注入 DOM 属性
    .filter(x=>isFinite(x.lat)&&isFinite(x.lng)):null;
  if(nom===null&&om===null){showRes([]);showDeg("搜索不可用 — 可点地图取点,或粘贴坐标(如 57.27, -5.51)");return;}
  const list=(nom||[]).slice();
  for(const o of (om||[]))                                // 去重:与已留 Nominatim 条目 <0.05°(约4km) 视为同位
    if(!list.some(x=>Math.abs(x.lat-o.lat)<0.05&&Math.abs(x.lng-o.lng)<0.05))list.push(o);
  if(!list.length){showRes([]);showDeg("未找到「"+q+"」,可尝试英文名或点地图取点");return;}
  showRes(list);showDeg("");
}
$("#ef-q").addEventListener("input",()=>{
  const q=$("#ef-q").value.trim();
  clearTimeout(qTimer);qSeq++;                            // 作废在飞结果
  const m=q.match(COORD_RE);                              // 粘贴坐标:纯本地,跳过一切网络
  if(m){
    const la=parseFloat(m[1]), ln=parseFloat(m[2]);
    if(la>=-90&&la<=90&&ln>=-180&&ln<=180){
      $("#ef-ll").value=la.toFixed(5)+", "+ln.toFixed(5);
      showRes([]);showDeg("已识别坐标并填入 ↓");return;
    }
  }
  if(/[^\x00-\x7F]/.test(q)){showRes([]);showDeg("含中文/非拉丁字符:按回车搜索(OSM + 城市库)");return;}   // 禁逐键
  if(q.length<3){showRes([]);showDeg("");return;}
  qTimer=setTimeout(()=>photonSearch(q),300);
});
$("#ef-q").addEventListener("keydown",e=>{
  if(e.key!=="Enter")return;
  e.preventDefault();
  const q=$("#ef-q").value.trim(); if(!q||q.match(COORD_RE))return;
  if(/[^\x00-\x7F]/.test(q))cjkSearch(q);
  else if(q.length>=3){clearTimeout(qTimer);photonSearch(q);}
});

async function resolveTz(){
  /* 作废守卫用 TRIP_ID+loadSeq 令牌,不用 TRIP 对象身份:commitEdit 每次事务都换 TRIP 对象但不换行程,
     对象身份守卫会把「在飞窗口内编辑一次」误判为切行程 → TRIP_TZ 终生为空、日出日落退回浏览器时区且不再自愈 */
  const T=TRIP, myId=TRIP_ID, mySeq=loadSeq;
  if(T.meta.tz){TRIP_TZ=T.meta.tz;return;}
  let pt=null;
  outer:for(const d of T.days){
    for(const it of d.items)if(it.lat!=null){pt=it;break outer;}
    if(d.stay&&d.stay.lat!=null){pt=d.stay;break outer;}
  }
  if(!pt){TRIP_TZ=Intl.DateTimeFormat().resolvedOptions().timeZone;return;}
  const ckey="tzauto."+pt.lat+","+pt.lng;      // 缓存键掺首坐标指纹:换导入文件/改 MD 首坐标即自然失效
  const cached=store.get(ckey,"");
  if(cached){TRIP_TZ=cached;markTzResolved(cached,"自动判定(缓存)");return;}
  try{
    const r=await fetchTO("https://api.open-meteo.com/v1/forecast?latitude="+pt.lat+"&longitude="+pt.lng+
      "&daily=weather_code&timezone=auto&forecast_days=1",null,8000);   // 必带超时:裸 fetch 挂网永不 settle → 太阳时刻永停浏览器 TZ + 天气连坐不加载
    const j=await r.json();
    if(!j||!j.timezone)throw new Error("响应缺 timezone 字段");
    if(TRIP_ID!==myId||loadSeq!==mySeq)return;   // 期间已切行程/导入,作废(编辑不 bump 令牌,放行)
    TRIP_TZ=j.timezone;store.set(ckey,j.timezone);markTzResolved(j.timezone,"自动判定");
  }catch(e){
    if(TRIP_ID!==myId||loadSeq!==mySeq)return;
    TRIP_TZ=Intl.DateTimeFormat().resolvedOptions().timeZone;
    (TRIP.warnings||(TRIP.warnings=[])).push("时区自动判定失败("+e.message+"),临时使用浏览器时区 "+TRIP_TZ);
    refreshWarnUI();
  }
}

/* ---------- 固化中心(P3.6):四类自动值 → 统一编辑事务回写进 MD ----------
   ① 时区 meta.tz←TRIP_TZ ② 日出日落 d.sun←自动 ③ 天气 d.wx←当前取到的自动文案 ④ 驾驶 d.drive←追加/替换「· 实测 …」段。
   每行展示「当前 MD 值 → 自动值」+勾选;未取到自动值的项置灰不可勾。点「固化所选」走 commitEdit(进草稿)。 */
const DRIVE_AUTO_RE=/(^|\s*·\s*)实测\s*[\d.]+\s*km\s*·\s*[0-9hm]+/g;   // 已固化过的「实测 X km · XhYm」自动段;前导「·」可选(orig 原为空时固化结果无前缀),g 一次清光历史残留多段
function autoSunText(di){const s=daySun(di);return s.ok?(hhmm(s.sunrise)+" / "+hhmm(s.sunset)):"";}
function autoWxText(di){
  const r=readDayWx(di); if(!r||!r.w)return "";
  return wxStr(r.w)+"（"+r.badge+"）";   // 含来源徽标文字,如「🌧 11–15℃ ☔79%（预报）」/「（近10年同日）」
}
function autoDriveText(di){
  const st=dayDriveStats(di); if(!st.complete||!(st.segs>0))return "";
  return "实测 "+st.km+" km · "+fmtDur(st.min);
}
function applyDriveAuto(orig,auto){   // 幂等:先清掉全部既有自动段,再统一追加(不动人写的提醒文字)
  const base=(orig||"").replace(DRIVE_AUTO_RE,"").replace(/^\s*·\s*/,"").trim();
  return base?base+" · "+auto:auto;
}
/* 四类候选:[{key,label,rows:[{id,di?,cur,next,can}], apply(T,selSet)}]。row.can=false→置灰不可勾。 */
function consCats(){
  const cats=[];
  // ① 时区
  const tzCur=(TRIP.meta.tz||"").trim();
  cats.push({key:"tz",label:"时区 meta",
    rows:[{id:"meta",cur:tzCur||"(未写)",next:TRIP_TZ||"",can:!!TRIP_TZ&&TRIP_TZ!==tzCur}],
    apply:(T,sel)=>{if(sel.has("tz:meta")&&TRIP_TZ)T.meta.tz=TRIP_TZ;}});   // 必须查勾选集(与 sun/wx/drive 同约);TRIP_TZ 在飞时绝不写空值
  // ② 日出日落
  const sunRows=TRIP.days.map((d,di)=>{const a=autoSunText(di);
    // !!TRIP_TZ:resolveTz 在飞窗口(TRIP_TZ==="")sunFmt 退回浏览器时区,此刻固化会把北京时间时刻写进 MD;失败回退已显式置 TZ+黄牌,放行
    return {id:d.id,di,cur:(d.sun||"").trim()||"(未写)",next:a,can:!!TRIP_TZ&&!!a&&a!==(d.sun||"").trim()};});
  cats.push({key:"sun",label:"日出日落 各天 sun",rows:sunRows,
    apply:(T,sel)=>{T.days.forEach((d,di)=>{if(sel.has("sun:"+d.id)){const a=autoSunText(di);if(a)d.sun=a;}});}});
  // ③ 天气
  const wxRows=TRIP.days.map((d,di)=>{const a=autoWxText(di);
    return {id:d.id,di,cur:(d.wx||"").trim()||"(未写)",next:a,can:!!a&&a!==(d.wx||"").trim()};});
  cats.push({key:"wx",label:"天气 各天 wx",rows:wxRows,
    apply:(T,sel)=>{T.days.forEach((d,di)=>{if(sel.has("wx:"+d.id)){const a=autoWxText(di);if(a)d.wx=a;}});}});
  // ④ 驾驶
  const drRows=TRIP.days.map((d,di)=>{const a=autoDriveText(di);
    const next=a?applyDriveAuto(d.drive||"",a):"";
    return {id:d.id,di,cur:(d.drive||"").trim()||"(未写)",next,can:!!a&&next!==(d.drive||"").trim()};});
  cats.push({key:"drive",label:"驾驶 各天 drive(追加/替换「· 实测」段,保留手写提醒)",rows:drRows,
    apply:(T,sel)=>{T.days.forEach((d,di)=>{if(sel.has("drive:"+d.id)){const a=autoDriveText(di);if(a)d.drive=applyDriveAuto(d.drive||"",a);}});}});
  return cats;
}
let consCatsCache=null;
function renderCons(){
  const cats=consCatsCache=consCats();
  const anyCan=cats.some(c=>c.rows.some(r=>r.can));
  const body=$("#cbody"), empty=$("#cempty");
  if(!anyCan){
    body.innerHTML="";empty.textContent="当前没有可固化的新自动值(各项自动值要么未取到,要么已与 MD 一致)。先让天气/路线算完再来。";empty.style.display="block";
    return;
  }
  empty.style.display="none";
  body.innerHTML=cats.map(c=>{
    const canRows=c.rows.filter(r=>r.can);
    const rowsH=c.rows.map(r=>{
      const cid=c.key+":"+(r.id||"meta");
      const idTag=c.key==="tz"?"":'<span class="ck-id">'+esc(r.id)+"</span> ";
      return '<label class="crow"><input type="checkbox" data-cck="'+esc(cid)+'"'+(r.can?"":" disabled")+(r.can?" checked":"")+">"+
        '<span class="cl">'+idTag+'<span class="cv-old">'+esc(r.cur)+'</span><span class="cv-arr">→</span>'+
        '<span class="cv-new">'+(r.next?esc(r.next):"(无自动值)")+"</span></span></label>";
    }).join("");
    return '<div class="csec"><label class="ch"><input type="checkbox" data-call="'+esc(c.key)+'"'+
      (canRows.length?" checked":" disabled")+">"+esc(c.label)+
      '<span class="cn">'+canRows.length+" 项可固化</span></label>"+rowsH+"</div>";
  }).join("");
}
function openCons(){
  if(!TRIP)return;
  closeForm();
  renderCons();
  $("#cform").classList.add("on");
}
function closeCons(){$("#cform").classList.remove("on");consCatsCache=null;}
$("#cons").onclick=()=>{const f=$("#cform");if(f.classList.contains("on"))closeCons();else openCons();};
$("#cf-cancel").onclick=()=>closeCons();
$("#cform").addEventListener("change",e=>{
  const all=e.target.closest("[data-call]");   // 类总开关:联动该类下所有可勾行
  if(all){const key=all.getAttribute("data-call"),on=all.checked;
    $("#cform").querySelectorAll('[data-cck^="'+key+':"]:not(:disabled)').forEach(b=>{b.checked=on;});}
});
$("#cf-save").onclick=()=>{
  if(!consCatsCache)return;
  const sel=new Set();
  $("#cform").querySelectorAll("[data-cck]:checked").forEach(b=>{if(!b.disabled)sel.add(b.getAttribute("data-cck"));});
  if(!sel.size){toast("没有勾选任何项");return;}
  const cats=consCatsCache, n=sel.size;
  const ok=commitEdit(T=>{cats.forEach(c=>c.apply(T,sel));},"已固化 "+n+" 项进草稿");
  if(ok)closeCons();
};

/* ---------- 存回文件(P3.7 / File System Access API,仅 Chrome/Edge 桌面) ----------
   feature-detect showSaveFilePicker → 显示「💾 存回文件」;首次取 handle 存内存,后续直接 write;成功清 draft 键 + toast。 */
let fileHandle=null;
function fsaSupported(){return typeof window.showSaveFilePicker==="function";}
function fsaSuggestName(){
  if(TRIP_FILE)return TRIP_FILE.split("/").pop();
  if(TRIP&&TRIP.meta&&TRIP.meta.title)return TRIP.meta.title+".md";
  return "trip.md";
}
async function saveBackToFile(){
  if(!fsaSupported())return;
  try{
    if(!fileHandle){
      fileHandle=await window.showSaveFilePicker({suggestedName:fsaSuggestName(),
        types:[{description:"Markdown",accept:{"text/markdown":[".md",".markdown"]}}]});
    }
    const w=await fileHandle.createWritable();
    await w.write(SRC);await w.close();
    ORIG_SRC=SRC;   // 磁盘已是当前版本:同步基线,否则「弃草稿」会回退到比磁盘更旧的版本,再存回即覆盖已保存的编辑
    store.del("draft");draftActive=false;updateSrcHint();
    toast("已写回文件「"+(fileHandle.name||"")+"」,草稿已清");
  }catch(e){
    if(e&&e.name==="AbortError")return;   // 用户取消选择,静默
    fileHandle=null;                      // 句柄失效(如权限丢失):下次重新选
    toast("写回文件失败:"+(e&&e.message||e));
  }
}
if(fsaSupported()){const fb=$("#fsave");if(fb){fb.hidden=false;fb.onclick=saveBackToFile;}}

/* ---------- 存回仓库(P9 / Cloudflare Functions + GitHub) ----------
   按钮先能力探测 /api/status:普通 http.server 没有后端时隐藏;保存成功清草稿,409 绝不覆盖远端。 */
let repoSaveOK=false,repoSaving=false,offSeq=0;
function updateRepoSaveButton(){
  const b=$("#rsave"); if(!b)return;
  b.hidden=!(repoSaveOK&&TRIPS&&TRIP_FILE&&TRIP_ID!=="preview");
}
async function detectRepoSave(){
  if(location.protocol!=="http:"&&location.protocol!=="https:"){repoSaveOK=false;updateRepoSaveButton();return;}
  try{
    const r=await fetchTO("api/status",{cache:"no-store"},3500);
    if(!r.ok)throw new Error("HTTP "+r.status);
    const j=await r.json();
    repoSaveOK=!!(j&&j.authenticated&&j.repoConfigured&&j.repoReachable);
  }catch(e){repoSaveOK=false;}
  updateRepoSaveButton();
}
async function sha256Text(s){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(String(s)));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function handleRepoConflict(j){
  toast("远端已变,当前草稿已保留,不会覆盖");
  if(confirm("远端已变。点“确定”先下载当前草稿;点“取消”继续留在本页。"))exportMd((TRIP_FILE||"trip").replace(/\.md$/,"")+"-本地草稿.md");
  if(j&&j.remoteMd&&confirm("是否导入远端最新版作为预览? 当前草稿仍留在浏览器本地,刷新会再次提示草稿。")){
    try{
      const id=tripIdOf(TRIP_FILE);
      loadSeq++;
      init(j.remoteMd,id,{noDraft:true});
      TRIP_FILE=TRIPS&&TRIPS.some(t=>t.file===id+".md")?id+".md":TRIP_FILE;
      ORIG_SRC=j.remoteMd;draftActive=false;updateSrcHint();
      toast("已加载远端最新版预览");
    }catch(e){toast("远端版本导入失败:"+e.message);}
  }else if(confirm("是否放弃本地草稿并刷新远端版本?")){
    store.del("draft");location.reload();
  }
}
async function saveBackToRepo(){
  if(repoSaving)return;
  if(!TRIP_FILE||TRIP_ID==="preview"){toast("导入预览不能直接存回仓库");return;}
  if(!repoSaveOK){toast("远端保存未配置或登录已过期");detectRepoSave();return;}
  const btn=$("#rsave");
  repoSaving=true;if(btn){btn.disabled=true;btn.textContent="⏳ 存回中";}
  try{
    const r=await fetchTO("api/save",{method:"POST",cache:"no-store",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({file:TRIP_FILE,md:SRC,baseHash:await sha256Text(ORIG_SRC)})},25000);
    let j=null;try{j=await r.json();}catch(e){}
    if(r.status===401){toast("登录已过期,请重新登录");location.href="login?next="+encodeURIComponent(location.pathname+location.search);return;}
    if(r.status===409){await handleRepoConflict(j||{});return;}
    if(!r.ok||!j||!j.ok)throw new Error((j&&(j.detail||j.error))||("HTTP "+r.status));
    ORIG_SRC=SRC;store.del("draft");draftActive=false;updateSrcHint();
    toast(j.noChange?"远端已是最新,无需提交":("已提交 "+(j.short||"")+";部署完成后刷新可见"));
  }catch(e){toast("存回仓库失败:"+(e&&e.message||e));}
  finally{repoSaving=false;if(btn){btn.disabled=false;btn.textContent="☁ 存回仓库";}}
}
const rb=$("#rsave");if(rb)rb.onclick=saveBackToRepo;

/* ---------- 动作单 ☰(P10.3):命令容器,只触发现有按钮/函数,不复制业务逻辑 ---------- */

/* ---------- 离线状态(P11):页面侧查 Cache API,不改 SW 协议 ---------- */
const OFFLINE_CORE=[
  "./index.html","./trips.json",
  encodeURI("./sample-trip.md"),
  encodeURI("./trip-template.md"),
  "./trip.data.js","./manifest.webmanifest"
];
async function offlineStatusText(){
  if(location.protocol!=="http:"&&location.protocol!=="https:")return "";
  if(!("serviceWorker" in navigator))return "离线壳不可用";
  if(!navigator.serviceWorker.controller)return "⚠ 缓存中...";
  if(!("caches" in window))return "离线状态不可判定";
  const hits=await Promise.all(OFFLINE_CORE.map(u=>caches.match(u).then(Boolean).catch(()=>false)));
  const ready=hits.every(Boolean);
  let s=ready?"✅ 可离线使用":"⚠ 缓存中...";
  const mapStatus=await offlineMapStatusText();
  if(mapStatus)s+=" · "+mapStatus;
  if(draftActive)s+=" · 有本地草稿";
  return s;
}
async function refreshOfflineStatus(announce){
  const seq=++offSeq,el=$("#offHint"); if(!el)return;
  try{
    const s=await offlineStatusText();
    if(seq!==offSeq)return;
    el.textContent=s;
    if(announce&&/^✅/.test(s)&&!gstore.get("offlineReadyToast",false)){
      gstore.set("offlineReadyToast",true);toast("已可离线使用");
    }
  }catch(e){if(seq===offSeq)el.textContent="离线状态不可判定";}
}
if("serviceWorker" in navigator&&location.protocol!=="file:"){
  navigator.serviceWorker.ready.then(()=>setTimeout(()=>refreshOfflineStatus(true),900)).catch(()=>{});
  navigator.serviceWorker.addEventListener&&navigator.serviceWorker.addEventListener("controllerchange",()=>setTimeout(()=>refreshOfflineStatus(true),500));
}
detectRepoSave();refreshOfflineStatus();

/* ---------- 启动:三级降级链 fetch(trips.json)→fetch(md) → window.TRIP_MD → 文件选择器 ---------- */
function init(md,tripId,opts){
  let T=parseTrip(md);                         // 先解析:0 天直接抛错,调用方回滚,不污染现有状态
  if(!T.days.length)throw new Error("MD 解析不到任何行程日(## Dn 区块)");
  const newId=tripId||"main";
  if(newId!==TRIP_ID)fileHandle=null;          // 切行程:旧文件句柄作废,存回须重新选文件
  TRIP_ID=newId;
  closeCons();                                 // 切/重载行程:关掉可能开着的固化面板(其缓存指向旧 TRIP)
  ORIG_SRC=md;draftActive=false;
  if(!(opts&&opts.noDraft)){                   // P3 草稿恢复:本空间有编辑草稿且与文件不同 → 用草稿,亮「● 草稿」
    const dr=store.get("draft",null);
    if(dr&&dr.md&&dr.md!==md){
      try{const TD=parseTrip(dr.md);if(TD.days.length){T=TD;md=dr.md;draftActive=true;}}catch(e){}
    }
  }
  SRC=md;TRIP=T;
  dirtyDays.clear();closeForm();
  clearSunAnchor();   // 行程重载/导入:临时锚随旧行程作废
  $("#err").style.display="none";
  if(!TRIP.days.find(d=>d.id===view))view="OV";
  updateSrcHint();
  renderPanel();renderMap();
  if(gmode)gset(gViewUrl());
  // 时区定后(成功落地真 TZ 或超时/失败 catch 回退 browserTZ,resolveTz 总会 settle):
  // 补一次 renderPanel(异步窗口内曾用空 TRIP_TZ 渲染 sunRow→北京时间,须用最终 TZ 重绘 + 刷新 sunLints),
  // 再算天气。loadWeather 放 finally:无论时区成败都调度,避免时区故障静默连坐天气功能。
  // 守卫同 resolveTz 用 TRIP_ID+loadSeq 令牌(勿用 TRIP 对象身份,编辑事务换对象不换行程)。
  const myId=TRIP_ID, mySeq=loadSeq;
  resolveTz().finally(()=>{
    if(TRIP_ID!==myId||loadSeq!==mySeq)return;
    renderPanel();
    // P4.6 行中模式:时区落定后判「今天(trip 时区)在行程内」→ 自动选当天;仅 OV 态跳,不覆盖用户手动选的天
    if(view==="OV"){const tid=todayDayId();if(tid)setView(tid);}
    loadWeather();
  });
}
async function loadTrip(file){                  // 返回 true=已提交;false=被更新的加载/导入取代(此时绝不抛错、绝不动状态)
  const seq=++loadSeq;
  let r,md;
  try{
    r=await fetchTO(encodeURI(file),{cache:"no-cache"});
    if(seq!==loadSeq)return false;       // 慢网挂起期间用户已另行加载:旧响应作废
    if(!r.ok)throw new Error("HTTP "+r.status);
    md=await r.text();
  }catch(e){if(seq!==loadSeq)return false;throw e;}
  if(seq!==loadSeq)return false;
  init(md,tripIdOf(file));               // 解析失败在此抛出 → 不写 lastTrip/URL,原行程保持可用
  TRIP_FILE=file;
  gstore.set("lastTrip",file);
  updateSrcHint();
  try{history.replaceState(null,"",location.pathname+"?trip="+encodeURIComponent(tripIdOf(file)));}catch(e){}
  return true;
}
function pickTrip(){
  const q=new URLSearchParams(location.search).get("trip");   // URLSearchParams 已自动 decodeURI
  if(q){const t=TRIPS.find(x=>x.file===q||tripIdOf(x.file)===q);if(t)return t.file;}
  const last=gstore.get("lastTrip","");
  if(last&&TRIPS.some(x=>x.file===last))return last;
  return TRIPS[0].file;
}
async function boot(){
  setGmode(!!gstore.get("gmode",false));
  try{                                            // ① 行程清单:失败才视为无多行程能力
    const r=await fetchTO("trips.json",{cache:"no-cache"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const j=await r.json();
    const list=((j&&j.trips)||[]).filter(t=>t&&t.file);
    if(!list.length)throw new Error("trips.json 为空");
    TRIPS=list;
  }catch(e){TRIPS=null;}                          // file:// 或清单拉取失败 → 兜底
  if(TRIPS){                                      // ② 单个 md 失败 ≠ 清单失败:逐个试,保留下拉
    const first=pickTrip(), errs=[];
    for(const f of [first,...TRIPS.map(t=>t.file).filter(x=>x!==first)]){
      try{
        if(await loadTrip(f)===false)return;   // 挂起期间用户已点选/导入:boot 让位,停止重试循环,不覆盖用户选择
        if(errs.length)toast("部分行程加载失败:"+errs.join(";")+";已改加载「"+tripLabel(f)+"」");
        return;
      }catch(e){errs.push(tripLabel(f)+"("+e.message+")");}
    }
    toast("行程 MD 全部加载失败:"+errs.join(";"));   // 下拉仍可用,可重试
  }
  if(window.TRIP_MD){
    try{
      init(window.TRIP_MD,"main");
      if(TRIPS)$("#srcHint").textContent="数据：trip.data.js 兜底（行程 MD 加载失败）";
      return;
    }catch(e){}
  }
  $("#err").style.display="flex";
}
boot();
})();
</script>
